<!DOCTYPE html>
<html>
<head>
    <title>OSWM Ontology Viewer</title>
    <script src="https://unpkg.com/vis-network@9.1.2/standalone/umd/vis-network.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; font-family: Arial, sans-serif; }
        #mynetwork { width: 100%; height: 100%; }
        #controls { position: absolute; top: 10px; left: 10px; background: rgba(255,255,255,0.9); padding: 10px; border-radius: 5px; box-shadow: 0 0 5px rgba(0,0,0,0.3); z-index: 10; }
    </style>
</head>
<body>
    <div id="controls">
        <h3>OSWM Ontology</h3>
        <p>Rendered from <code>pathways_oswm.owl</code></p>
        <label for="fontSizeSlider">Class Size: <span id="fontSizeDisplay">32</span></label>
        <br>
        <input type="range" id="fontSizeSlider" min="10" max="60" value="32" oninput="updateFontSize(this.value)">
        <br><br>
        <label for="edgeSizeSlider">Arrow Label Size: <span id="edgeSizeDisplay">14</span></label>
        <br>
        <input type="range" id="edgeSizeSlider" min="8" max="40" value="14" oninput="updateEdgeFontSize(this.value)">
    </div>
    <div id="mynetwork"></div>
    <script>
        var nodes = new vis.DataSet([{"id": "Sidewalk", "label": "Sidewalk", "color": "#FFFFCC", "shape": "box", "font": {"size": 32}}, {"id": "Footway", "label": "Footway", "color": "#FFFFCC", "shape": "box", "font": {"size": 32}}, {"id": "Potential_Footways", "label": "Potential_Footways", "color": "#FFFFCC", "shape": "box", "font": {"size": 32}}, {"id": "UtilityPoint", "label": "UtilityPoint", "color": "#CCFFFF", "shape": "box", "font": {"size": 32}}, {"id": "Informal_Footway", "label": "Informal_Footway", "color": "#FFFFCC", "shape": "box", "font": {"size": 32}}, {"id": "Stairway", "label": "Stairway", "color": "#FFFFCC", "shape": "box", "font": {"size": 32}}, {"id": "KerbAccessPoint", "label": "KerbAccessPoint", "color": "#CCFFFF", "shape": "box", "font": {"size": 32}}, {"id": "Pathway", "label": "Pathway", "color": "#E0E0E0", "shape": "box", "font": {"size": 32}}, {"id": "Road", "label": "Road", "color": "#E0E0E0", "shape": "box", "font": {"size": 32}}, {"id": "PedestrianAreas", "label": "PedestrianAreas", "color": "#CCFFE6", "shape": "box", "font": {"size": 32}}, {"id": "TraversibleAreas", "label": "TraversibleAreas", "color": "#CCFFE6", "shape": "box", "font": {"size": 32}}, {"id": "Other_Pathways", "label": "Other_Pathways", "color": "#E3E3E3", "shape": "box", "font": {"size": 32}}, {"id": "Crossing", "label": "Crossing", "color": "#FFFFCC", "shape": "box", "font": {"size": 32}}]);
        var edges = new vis.DataSet([{"id": "edge_0", "from": "Footway", "to": "Pathway", "label": "is_a", "color": {"color": "#004C99"}, "arrows": "to", "font": {"align": "middle", "size": 14, "background": "rgba(255, 255, 255, 0.75)", "strokeWidth": 0}}, {"id": "edge_1", "from": "Road", "to": "Pathway", "label": "is_a", "color": {"color": "#004C99"}, "arrows": "to", "font": {"align": "middle", "size": 14, "background": "rgba(255, 255, 255, 0.75)", "strokeWidth": 0}}, {"id": "edge_2", "from": "Sidewalk", "to": "Footway", "label": "is_a", "color": {"color": "#004C99"}, "arrows": "to", "font": {"align": "middle", "size": 14, "background": "rgba(255, 255, 255, 0.75)", "strokeWidth": 0}}, {"id": "edge_3", "from": "Other_Pathways", "to": "Pathway", "label": "is_a", "color": {"color": "#004C99"}, "arrows": "to", "font": {"align": "middle", "size": 14, "background": "rgba(255, 255, 255, 0.75)", "strokeWidth": 0}}, {"id": "edge_4", "from": "Potential_Footways", "to": "Pathway", "label": "is_a", "color": {"color": "#004C99"}, "arrows": "to", "font": {"align": "middle", "size": 14, "background": "rgba(255, 255, 255, 0.75)", "strokeWidth": 0}}, {"id": "edge_5", "from": "Informal_Footway", "to": "Road", "label": "is_a", "color": {"color": "#004C99"}, "arrows": "to", "font": {"align": "middle", "size": 14, "background": "rgba(255, 255, 255, 0.75)", "strokeWidth": 0}}, {"id": "edge_6", "from": "Stairway", "to": "Footway", "label": "is_a", "color": {"color": "#004C99"}, "arrows": "to", "font": {"align": "middle", "size": 14, "background": "rgba(255, 255, 255, 0.75)", "strokeWidth": 0}}, {"id": "edge_7", "from": "Crossing", "to": "Footway", "label": "is_a", "color": {"color": "#004C99"}, "arrows": "to", "font": {"align": "middle", "size": 14, "background": "rgba(255, 255, 255, 0.75)", "strokeWidth": 0}}, {"id": "edge_8", "from": "PedestrianAreas", "to": "TraversibleAreas", "label": "is_a", "color": {"color": "#004C99"}, "arrows": "to", "font": {"align": "middle", "size": 14, "background": "rgba(255, 255, 255, 0.75)", "strokeWidth": 0}}, {"id": "edge_9", "from": "KerbAccessPoint", "to": "UtilityPoint", "label": "is_a", "color": {"color": "#004C99"}, "arrows": "to", "font": {"align": "middle", "size": 14, "background": "rgba(255, 255, 255, 0.75)", "strokeWidth": 0}}, {"id": "edge_10", "from": "Crossing", "to": "Footway", "label": "connects", "color": {"color": "#004C99"}, "arrows": "to", "dashes": true, "font": {"align": "middle", "size": 14, "background": "rgba(255, 255, 255, 0.75)", "strokeWidth": 0}}, {"id": "edge_11", "from": "Crossing", "to": "Pathway", "label": "connects", "color": {"color": "#004C99"}, "arrows": "to", "dashes": true, "font": {"align": "middle", "size": 14, "background": "rgba(255, 255, 255, 0.75)", "strokeWidth": 0}}, {"id": "edge_12", "from": "Sidewalk", "to": "Road", "label": "is_juxtaposed", "color": {"color": "#004C99"}, "arrows": "to", "dashes": true, "font": {"align": "middle", "size": 14, "background": "rgba(255, 255, 255, 0.75)", "strokeWidth": 0}}, {"id": "edge_13", "from": "PedestrianAreas", "to": "Footway", "label": "contains", "color": {"color": "#004C99"}, "arrows": "to", "dashes": true, "font": {"align": "middle", "size": 14, "background": "rgba(255, 255, 255, 0.75)", "strokeWidth": 0}}, {"id": "edge_14", "from": "PedestrianAreas", "to": "Pathway", "label": "contains", "color": {"color": "#004C99"}, "arrows": "to", "dashes": true, "font": {"align": "middle", "size": 14, "background": "rgba(255, 255, 255, 0.75)", "strokeWidth": 0}}, {"id": "edge_15", "from": "TraversibleAreas", "to": "Footway", "label": "contains", "color": {"color": "#004C99"}, "arrows": "to", "dashes": true, "font": {"align": "middle", "size": 14, "background": "rgba(255, 255, 255, 0.75)", "strokeWidth": 0}}, {"id": "edge_16", "from": "TraversibleAreas", "to": "Pathway", "label": "contains", "color": {"color": "#004C99"}, "arrows": "to", "dashes": true, "font": {"align": "middle", "size": 14, "background": "rgba(255, 255, 255, 0.75)", "strokeWidth": 0}}, {"id": "edge_17", "from": "Potential_Footways", "to": "Footway", "label": "probably_is_a", "color": {"color": "#004C99"}, "arrows": "to", "dashes": true, "font": {"align": "middle", "size": 14, "background": "rgba(255, 255, 255, 0.75)", "strokeWidth": 0}}, {"id": "edge_18", "from": "Potential_Footways", "to": "Road", "label": "may_also_be", "color": {"color": "#004C99"}, "arrows": "to", "dashes": true, "font": {"align": "middle", "size": 14, "background": "rgba(255, 255, 255, 0.75)", "strokeWidth": 0}}, {"id": "edge_19", "from": "Potential_Footways", "to": "Other_Pathways", "label": "may_also_be", "color": {"color": "#004C99"}, "arrows": "to", "dashes": true, "font": {"align": "middle", "size": 14, "background": "rgba(255, 255, 255, 0.75)", "strokeWidth": 0}}, {"id": "edge_20", "from": "Informal_Footway", "to": "Footway", "label": "is_used_as", "color": {"color": "#004C99"}, "arrows": "to", "dashes": true, "font": {"align": "middle", "size": 14, "background": "rgba(255, 255, 255, 0.75)", "strokeWidth": 0}}, {"id": "edge_21", "from": "KerbAccessPoint", "to": "Crossing", "label": "Is_above", "color": {"color": "#004C99"}, "arrows": "to", "dashes": true, "font": {"align": "middle", "size": 14, "background": "rgba(255, 255, 255, 0.75)", "strokeWidth": 0}}]);

        var container = document.getElementById('mynetwork');
        var data = {
            nodes: nodes,
            edges: edges
        };
        var options = {
            layout: {
                hierarchical: false
            },
            physics: {
                enabled: true,
                solver: 'barnesHut',
                barnesHut: {
                    gravitationalConstant: -10000,
                    centralGravity: 0.1,
                    springLength: 350,
                    springConstant: 0.04,
                    damping: 0.09,
                    avoidOverlap: 1
                }
            },
            edges: {
                smooth: {
                    enabled: true,
                    type: 'cubicBezier',
                    roundness: 0.5
                }
            }
        };
        var network = new vis.Network(container, data, options);
        // disable physics once stabilized to stop spinning and allow free dragging
        network.once("stabilized", function () {
            network.setOptions({ physics: false });
        });
        // Safety timeout: force-disable physics after 3 seconds in case stabilization hangs
        setTimeout(function() {
            network.setOptions({ physics: false });
        }, 3000);

        function updateFontSize(newSize) {
            document.getElementById('fontSizeDisplay').innerText = newSize;
            var updates = [];
            nodes.forEach(function(node) {
                updates.push({id: node.id, font: {size: Number(newSize)}});
            });
            nodes.update(updates);
        }

        function updateEdgeFontSize(newSize) {
            document.getElementById('edgeSizeDisplay').innerText = newSize;
            var updates = [];
            edges.forEach(function(edge) {
                updates.push({id: edge.id, font: {size: Number(newSize)}});
            });
            edges.update(updates);
        }
    </script>
</body>
</html>
